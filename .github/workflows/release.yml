name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, Windows]

    env:
      ReferencePath: 'C:\Program Files (x86)\Steam\steamapps\common\Derail Valley\DerailValley_Data\Managed\'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches info.json version
        shell: powershell
        run: |
          $version = (Get-Content -Raw info.json | ConvertFrom-Json).Version
          $tag = '${{ github.ref_name }}' -replace '^v', ''
          if ($version -ne $tag) {
            Write-Error "Tag '$tag' does not match info.json Version '$version'. Bump info.json (and repository.json) before tagging."
            exit 1
          }
          Write-Host "Releasing version $version"

      - name: Build and package
        run: dotnet build StockCarRemover.sln -c Release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} dist/StockCarRemover.zip --title ${{ github.ref_name }} --generate-notes
